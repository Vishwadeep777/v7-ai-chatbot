<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-7 AI | Portfolio Project</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #343541;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* --- Updated Header Styling --- */
        .header {
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4d4d4f;
            background: #202123;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .header-dev {
            font-size: 0.85rem;
            color: #acacbe;
        }

        .header-dev a {
            color: #19c37d;
            text-decoration: none;
            font-weight: 600;
        }

        .header-dev a:hover {
            text-decoration: underline;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* --- Message Bubbles --- */
        .message {
            display: flex;
            gap: 20px;
            margin: 25px 0;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            background: #444654;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .user .avatar { background: #19c37d; }

        .bubble {
            max-width: 85%;
            padding: 5px 10px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .user .bubble { 
            background: #40414f; 
            border-radius: 12px;
            padding: 10px 15px;
        }

        .ai .bubble { background: transparent; }

        /* --- Input Area --- */
        .input-area {
            padding: 20px;
            background: linear-gradient(transparent, #343541 30%);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 768px;
            display: flex;
            align-items: flex-end;
            background: #40414f;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 200px;
            font-family: inherit;
        }

        .controls { display: flex; gap: 8px; margin-left: 10px; }

        button.action-btn {
            background: #19c37d;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button.action-btn:hover { background: #1a8e5f; }
        
        button.stop-btn { background: #cf4242; }
        button.stop-btn:hover { background: #a83232; }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #9a9ab0;
            background: #202123;
            border-top: 1px solid #4d4d4f;
        }

        /* --- Utilities --- */
        .thinking { color: #acacbe; font-style: italic; }
        .dots::after { content: ""; animation: dots 1.5s infinite; }
        @keyframes dots { 0% {content: "";} 33% {content: ".";} 66% {content: "..";} 100% {content: "...";} }

        .copy-btn {
            font-size: 11px;
            background: #565869;
            color: #d9d9e3;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            margin-bottom: 8px;
        }

        pre { 
            background: #0d1117; 
            padding: 15px; 
            border-radius: 8px; 
            overflow-x: auto; 
            border: 1px solid #30363d;
        }
        
        code { font-family: 'Fira Code', monospace; }
    </style>
</head>

<body>

    <div class="main">
        <div class="header">
            <div class="header-title">🤖 V-7 AI</div>
            <div class="header-dev">
                By <a href="https://github.com/Vishvdeep777" target="_blank">Vishvdeep Pundge</a>
            </div>
        </div>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" placeholder="Ask anything to V-7 AI..." rows="1"></textarea>
                <div class="controls">
                    <button class="action-btn" onclick="send()" title="Send Message">Send</button>
                    <button class="action-btn stop-btn" onclick="stop()" title="Stop Generating">Stop</button>
                    <button class="action-btn" style="background:#565869" onclick="clearChat()" title="Clear Conversation">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        V-7 AI is powered by Gemini 1.5 Flash. Verify important info. <br>
        &copy; 2026 Vishvdeep.
    </div>

<script>
    const chat = document.getElementById("chat-container");
    const input = document.getElementById("input");
    let controller = null;
    let lastInput = "";

    // Auto-resize textarea logic
    input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    });

    function msg(role, text) {
        const d = document.createElement("div");
        d.className = "message " + role;
        
        const a = document.createElement("div");
        a.className = "avatar";
        a.innerText = role === "ai" ? "🤖" : "👤";
        
        const b = document.createElement("div");
        b.className = "bubble";
        b.innerHTML = text;
        
        d.append(a, b);
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return b;
    }

    async function send() {
        const text = input.value.trim();
        if (!text) return;
        lastInput = text;

        msg("user", text);
        input.value = "";
        input.style.height = "auto";

        const aiBubble = msg("ai", '<span class="thinking">V-7 AI is thinking<span class="dots"></span></span>');
        
        controller = new AbortController();

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text }),
                signal: controller.signal
            });

            if (!response.ok) throw new Error(await response.text());

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            
            aiBubble.innerHTML = ""; 

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                fullText += chunk;

                // Update UI with parsed Markdown
                aiBubble.innerHTML = marked.parse(fullText);
                highlight(); 
                chat.scrollTop = chat.scrollHeight;
            }
            
        } catch (e) {
            if (e.name === 'AbortError') {
                aiBubble.innerHTML += " <i style='color:orange'>[Generation Stopped]</i>";
            } else {
                aiBubble.innerHTML = `<span style="color:#cf4242">Error: ${e.message}</span>`;
            }
        }
    }

    function stop() {
        if (controller) controller.abort();
    }

    function clearChat() {
        if (confirm("Clear all messages?")) {
            chat.innerHTML = "";
        }
    }

    function highlight() {
        document.querySelectorAll("pre code").forEach(block => {
            if (!block.dataset.highlighted) {
                hljs.highlightElement(block);
                block.dataset.highlighted = "true";
                
                // Add Copy Button to code blocks
                if (!block.parentElement.querySelector(".copy-btn")) {
                    const btn = document.createElement("div");
                    btn.className = "copy-btn";
                    btn.innerText = "Copy";
                    btn.onclick = () => {
                        navigator.clipboard.writeText(block.innerText);
                        btn.innerText = "Copied!";
                        setTimeout(() => btn.innerText = "Copy", 2000);
                    };
                    block.parentElement.prepend(btn);
                }
            }
        });
    }

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });
</script>

</body>
</html>
