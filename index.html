<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-7 AI | Portfolio Project</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #343541;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* --- Header & Persona Styling --- */
        .header {
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4d4d4f;
            background: #202123;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-dev {
            font-size: 0.85rem;
            color: #acacbe;
        }

        .header-dev a {
            color: #19c37d;
            text-decoration: none;
            font-weight: 600;
        }

        #persona-select {
            background: #40414f;
            color: white;
            border: 1px solid #565869;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }

        /* --- Rate Limit Bar Styling --- */
        .quota-container {
            padding: 8px 25px;
            background: #202123;
            border-bottom: 1px solid #4d4d4f;
        }

        .quota-info {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #acacbe;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .quota-track {
            width: 100%;
            height: 4px;
            background: #444654;
            border-radius: 2px;
            overflow: hidden;
        }

        #quota-bar {
            width: 100%;
            height: 100%;
            background: #19c37d;
            transition: width 0.4s ease, background 0.4s ease;
        }

        /* --- Chat UI --- */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            gap: 20px;
            margin: 25px 0;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user { flex-direction: row-reverse; }

        .avatar {
            width: 36px;
            height: 36px;
            background: #444654;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.2rem;
        }

        .user .avatar { background: #19c37d; }

        .bubble {
            max-width: 85%;
            padding: 5px 10px;
            line-height: 1.6;
        }

        .user .bubble { 
            background: #40414f; 
            border-radius: 12px;
            padding: 10px 15px;
        }

        /* --- Input --- */
        .input-area {
            padding: 20px;
            background: linear-gradient(transparent, #343541 30%);
            display: flex;
            justify-content: center;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 768px;
            display: flex;
            align-items: flex-end;
            background: #40414f;
            border-radius: 12px;
            padding: 12px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 8px;
            font-size: 16px;
            outline: none;
            resize: none;
            max-height: 200px;
        }

        .controls { display: flex; gap: 8px; margin-left: 10px; }

        button.action-btn {
            background: #19c37d;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        .stop-btn { background: #cf4242 !important; }

        .footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #9a9ab0;
            background: #202123;
            border-top: 1px solid #4d4d4f;
        }

        /* --- Tools --- */
        .thinking { color: #acacbe; font-style: italic; }
        .dots::after { content: ""; animation: dots 1.5s infinite; }
        @keyframes dots { 0% {content: "";} 33% {content: ".";} 66% {content: "..";} 100% {content: "...";} }

        .copy-btn {
            font-size: 11px;
            background: #565869;
            color: #d9d9e3;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            margin-bottom: 8px;
        }

        pre { background: #0d1117; padding: 15px; border-radius: 8px; overflow-x: auto; border: 1px solid #30363d;}
    </style>
</head>

<body>

    <div class="main">
        <div class="header">
            <div class="header-title">🤖 V-7 AI</div>
            <div class="header-right">
                <select id="persona-select">
                    <option value="general">🤖 General AI</option>
                    <option value="java_expert">☕ Java Expert</option>
                    <option value="resume_expert">📄 Resume Coach</option>
                    <option value="creative">🎨 Creative Mode</option>
                </select>
                <div class="header-dev">
                    By <a href="https://github.com/Vishvdeep777" target="_blank">Vishvdeep</a>
                </div>
            </div>
        </div>

        <div class="quota-container">
            <div class="quota-info">
                <span>API Usage Limit</span>
                <span id="quota-text">5 / 5 Requests Left</span>
            </div>
            <div class="quota-track">
                <div id="quota-bar"></div>
            </div>
        </div>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" placeholder="Ask anything to V-7 AI..." rows="1"></textarea>
                <div class="controls">
                    <button class="action-btn" onclick="send()">Send</button>
                    <button class="action-btn stop-btn" onclick="stop()">Stop</button>
                    <button class="action-btn" style="background:#565869" onclick="clearChat()">Clear</button>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        V-7 AI is powered by Gemini 2.0 Flash. &copy; 2026 Vishvdeep Pundge.
    </div>

<script>
    const chat = document.getElementById("chat-container");
    const input = document.getElementById("input");
    const quotaBar = document.getElementById("quota-bar");
    const quotaText = document.getElementById("quota-text");
    
    let controller = null;
    let lastInput = "";
    
    // Rate Limit Logic
    const MAX_REQUESTS = 5;
    let requestsLeft = MAX_REQUESTS;

    function updateQuotaUI() {
        const percentage = (requestsLeft / MAX_REQUESTS) * 100;
        quotaBar.style.width = percentage + "%";
        quotaText.innerText = `${requestsLeft} / ${MAX_REQUESTS} Requests Left`;
        
        if (requestsLeft <= 1) quotaBar.style.background = "#cf4242";
        else if (requestsLeft <= 3) quotaBar.style.background = "#f1c40f";
        else quotaBar.style.background = "#19c37d";
    }

    input.addEventListener("input", () => {
        input.style.height = "auto";
        input.style.height = input.scrollHeight + "px";
    });

    function msg(role, text) {
        const d = document.createElement("div");
        d.className = "message " + role;
        const a = document.createElement("div");
        a.className = "avatar";
        a.innerText = role === "ai" ? "🤖" : "👤";
        const b = document.createElement("div");
        b.className = "bubble";
        b.innerHTML = text;
        d.append(a, b);
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return b;
    }

    async function send() {
        if (requestsLeft <= 0) {
            msg("ai", "⚠️ Rate limit reached. Please wait a minute for the quota to refill.");
            return;
        }

        const text = input.value.trim();
        if (!text) return;
        lastInput = text;

        const persona = document.getElementById("persona-select").value;

        msg("user", text);
        input.value = "";
        input.style.height = "auto";

        // Update Quota
        requestsLeft--;
        updateQuotaUI();
        setTimeout(() => { 
            if(requestsLeft < MAX_REQUESTS) {
                requestsLeft++; 
                updateQuotaUI();
            }
        }, 60000);

        const aiBubble = msg("ai", '<span class="thinking">V-7 AI is thinking<span class="dots"></span></span>');
        controller = new AbortController();

        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text, persona: persona }),
                signal: controller.signal
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";
            aiBubble.innerHTML = ""; 

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                fullText += decoder.decode(value, { stream: true });
                aiBubble.innerHTML = marked.parse(fullText);
                highlight(); 
                chat.scrollTop = chat.scrollHeight;
            }
        } catch (e) {
            aiBubble.innerHTML = e.name === 'AbortError' ? "<i>Stopped.</i>" : "Error: " + e.message;
        }
    }

    function stop() { if (controller) controller.abort(); }
    
    function clearChat() { 
        if (confirm("Clear chat?")) chat.innerHTML = ""; 
    }

    function highlight() {
        document.querySelectorAll("pre code").forEach(block => {
            if (!block.dataset.highlighted) {
                hljs.highlightElement(block);
                block.dataset.highlighted = "true";
                const btn = document.createElement("div");
                btn.className = "copy-btn";
                btn.innerText = "Copy";
                btn.onclick = () => {
                    navigator.clipboard.writeText(block.innerText);
                    btn.innerText = "Copied!";
                    setTimeout(() => btn.innerText = "Copy", 2000);
                };
                block.parentElement.prepend(btn);
            }
        });
    }

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });
</script>
</body>
</html>
