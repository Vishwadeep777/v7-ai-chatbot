<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>V-7 AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #343541;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
}

.header {
    padding: 15px;
    text-align: center;
    font-weight: bold;
    border-bottom: 1px solid #444;
    background: #343541;
}

#chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scroll-behavior: smooth;
}

.message {
    display: flex;
    gap: 15px;
    margin: 20px 0;
    max-width: 850px;
    margin-left: auto;
    margin-right: auto;
}

.user { flex-direction: row-reverse; }

.avatar {
    width: 36px;
    height: 36px;
    background: #444;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.user .avatar { background: #19c37d; }

.bubble {
    max-width: 80%;
    padding: 10px 15px;
    border-radius: 8px;
    line-height: 1.5;
    word-wrap: break-word;
}

.user .bubble { background: #19c37d; color: white; }
.ai .bubble { background: transparent; }

.input-area {
    padding: 10px 20px;
    background: #343541;
    display: flex;
    justify-content: center;
}

.input-wrapper {
    position: relative;
    width: 100%;
    max-width: 768px;
    display: flex;
    align-items: flex-end;
    background: #40414f;
    border-radius: 12px;
    padding: 10px;
}

textarea {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    padding: 10px;
    font-size: 16px;
    outline: none;
    resize: none;
    max-height: 150px;
}

.controls { display: flex; gap: 5px; }

button.action-btn {
    background: #19c37d;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
}

.footer {
    text-align: center;
    padding: 10px;
    font-size: 12px;
    color: #999;
    background: #202123;
    border-top: 1px solid #444;
}

.thinking { color: #aaa; font-style: italic; }
.dots::after { content: ""; animation: dots 1.5s infinite; }
@keyframes dots { 0% {content: "";} 33% {content: ".";} 66% {content: "..";} 100% {content: "...";} }

.copy-btn {
    font-size: 11px;
    background: #555;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    float: right;
    margin-bottom: 5px;
}

pre { background: #0d1117; padding: 10px; border-radius: 6px; overflow-x: auto; }
</style>
</head>

<body>

    <div class="main">
        <div class="header">🤖 V-7 AI</div>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="input" placeholder="Ask anything to V-7 AI..." rows="1"></textarea>
                <div class="controls">
                    <button class="action-btn" onclick="send()">Send</button>
                    <button class="action-btn" style="background:#cf4242" onclick="stop()">Stop</button>
                    <button class="action-btn" onclick="regen()">↻</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        V-7 AI can make mistakes. Please verify important information.<br>
        &copy; 2026 VP. All Rights Reserved.
    </div>

<script>
let chat = document.getElementById("chat-container");
let input = document.getElementById("input");
let controller = null;
let lastInput = "";

// Auto-resize textarea
input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
});

function msg(role, text) {
    let d = document.createElement("div");
    d.className = "message " + role;
    let a = document.createElement("div");
    a.className = "avatar";
    a.innerText = role == "ai" ? "🤖" : "👤";
    let b = document.createElement("div");
    b.className = "bubble";
    b.innerHTML = text;
    d.append(a, b);
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
    return b;
}

/* STREAMING SEND FUNCTION */
async function send() {
    let text = input.value.trim();
    if (!text) return;
    lastInput = text;

    // Show User Message
    msg("user", text);
    input.value = "";
    input.style.height = "auto";

    // Show AI "Thinking" Bubble
    let aiBubble = msg("ai", '<span class="thinking">V-7 AI is thinking<span class="dots"></span></span>');
    
    controller = new AbortController();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text }),
            signal: controller.signal
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let fullText = "";
        
        // Clear "thinking" as soon as stream starts
        aiBubble.innerHTML = ""; 

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            let chunk = decoder.decode(value, { stream: true });
            fullText += chunk;

            // Render Markdown and highlight code
            aiBubble.innerHTML = marked.parse(fullText);
            highlight(); 
            
            chat.scrollTop = chat.scrollHeight;
        }
        
    } catch (e) {
        if (e.name === 'AbortError') {
            aiBubble.innerHTML = "<i>Stopped.</i>";
        } else {
            aiBubble.innerHTML = "Error: " + e.message;
        }
    }
}

function stop() { if (controller) controller.abort(); }
function regen() { if (lastInput) { input.value = lastInput; send(); } }

function highlight() {
    document.querySelectorAll("pre code").forEach(block => {
        hljs.highlightElement(block);
        if (!block.parentElement.querySelector(".copy-btn")) {
            let btn = document.createElement("div");
            btn.className = "copy-btn";
            btn.innerText = "Copy";
            btn.onclick = () => {
                navigator.clipboard.writeText(block.innerText);
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy", 2000);
            };
            block.parentElement.prepend(btn);
        }
    });
}

// Enter key support
input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});
</script>

</body>
</html>
